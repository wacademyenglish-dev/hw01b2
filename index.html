<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WOLF LABS | The Office Politics (HW)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-base: #050505;
            --bg-panel: #111111;
            --accent-brand: #D4AF37; /* Executive Gold */
            --accent-success: #2A9D8F;
            --accent-danger: #E63946;
            --text-main: #E0E0E0;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-base);
            color: var(--text-main);
            overflow: hidden; 
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation; 
        }

        .font-display { font-family: 'Playfair Display', serif; letter-spacing: -0.01em; }
        .font-code { font-family: 'Fira Code', monospace; }

        #app-container {
            max-width: 480px; margin: 0 auto; height: 100vh; height: 100dvh;
            background-color: var(--bg-base); display: flex; flex-col; position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.8); border-left: 1px solid rgba(212, 175, 55, 0.1); border-right: 1px solid rgba(212, 175, 55, 0.1);
        }

        .top-bar { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); background: rgba(5, 5, 5, 0.95); z-index: 10; }
        .progress-track { width: 100%; height: 4px; background: #222; border-radius: 2px; overflow: hidden; margin-top: 10px; }
        .progress-fill { height: 100%; background: var(--accent-brand); width: 0%; transition: width 0.3s ease; }

        #question-area { flex-grow: 1; overflow-y: auto; padding: 24px; padding-bottom: 100px; }

        .option-btn {
            width: 100%; background: var(--bg-panel); border: 1px solid rgba(255,255,255,0.05); border-radius: 4px;
            padding: 18px 20px; text-align: left; font-size: 1.05rem; margin-bottom: 12px; color: var(--text-main);
            transition: all 0.2s; display: flex; align-items: center; font-weight: 500;
        }
        .option-btn:active { transform: scale(0.98); }
        .option-btn.correct { background: rgba(42, 157, 143, 0.1); border-color: var(--accent-success); color: var(--accent-success); }
        .option-btn.wrong { background: rgba(230, 57, 70, 0.1); border-color: var(--accent-danger); color: #FCA5A5; }
        
        .option-letter {
            width: 32px; height: 32px; border-radius: 2px; background: var(--bg-base); border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center;
            font-family: 'Fira Code', monospace; font-weight: bold; margin-right: 16px; color: #888; flex-shrink: 0;
        }
        .option-btn.correct .option-letter { background: var(--accent-success); color: #000; border-color: transparent;}
        .option-btn.wrong .option-letter { background: var(--accent-danger); color: #fff; border-color: transparent;}

        .slide-in { animation: slideIn 0.4s ease forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-2px, 0, 0); } 20%, 80% { transform: translate3d(3px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
    </style>
</head>
<body>

<div id="app-container" class="flex flex-col">
    
    <div id="start-screen" class="flex flex-col items-center justify-center h-full p-8 text-center bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCI+PGNpcmNsZSBjeD0iMTAiIGN5PSIxMCIgcj0iMSIgZmlsbD0icmdiYSgyMTIsIDE3NSwgNTUsIDAuMDUpIi8+PC9zdmc+')]">
        <div class="w-24 h-24 bg-[var(--bg-panel)] border border-[var(--accent-brand)] rounded-full flex items-center justify-center mb-8 shadow-[0_0_30px_rgba(212,175,55,0.2)]">
            <i class="fas fa-chess-king text-5xl text-[var(--accent-brand)]"></i>
        </div>
        <p class="font-code text-[var(--accent-brand)] text-xs tracking-[0.3em] mb-2 uppercase">Mobile Training</p>
        <h1 class="font-display text-4xl font-bold text-white mb-4 leading-tight uppercase">Office <br>Politics</h1>
        <p class="text-gray-400 text-sm mb-12 font-medium px-4">15 questions to lock in Advanced Reporting Verbs for the C-Suite.</p>
        <button onclick="startQuiz()" class="w-full py-4 bg-gradient-to-r from-[var(--accent-brand)] to-[#B8860B] text-black font-inter font-bold text-lg uppercase tracking-widest rounded shadow-[0_4px_15px_rgba(212,175,55,0.3)] transition-transform active:scale-95">Enter Briefing</button>
    </div>

    <div id="quiz-ui" class="hidden flex-col h-full w-full">
        <div class="top-bar">
            <div class="flex justify-between items-center font-code text-xs font-bold text-gray-400 uppercase tracking-widest">
                <span id="q-counter">Q 1/15</span>
                <span id="score-display" class="text-[var(--accent-brand)]">0 XP</span>
            </div>
            <div class="progress-track"><div id="progress-bar" class="progress-fill"></div></div>
        </div>
        <div id="question-area" class="flex flex-col justify-center"></div>
    </div>

    <div id="wrap-screen" class="hidden flex-col items-center justify-center h-full p-8 text-center relative">
        <div class="bg-[var(--bg-panel)] border border-[var(--accent-brand)]/30 w-full text-center relative z-10 p-10 rounded shadow-2xl">
            <i class="fas fa-file-signature text-6xl text-[var(--accent-success)] mb-6"></i>
            <h2 class="font-display text-3xl font-bold text-white mb-2 uppercase">Report Filed</h2>
            <p class="font-inter text-gray-400 mb-8 text-sm">Diplomatic reporting mastered.</p>
            
            <div class="bg-[var(--bg-base)] border border-gray-800 p-4 mb-8 rounded">
                <p class="text-[10px] font-code text-gray-500 uppercase tracking-widest mb-1">Final Clearance</p>
                <p id="final-score" class="font-display font-bold text-4xl text-[var(--accent-brand)]">0/15</p>
            </div>
            
            <button onclick="location.reload()" class="w-full py-4 bg-transparent border border-[var(--accent-brand)] text-[var(--accent-brand)] font-inter font-bold uppercase tracking-widest hover:bg-[var(--accent-brand)] hover:text-black transition-colors rounded">Return to Dashboard</button>
        </div>
    </div>

</div>

<script>
    const quizData = [
        // Vocab
        { q: "To betray a colleague by blaming them for a mistake is to...", opts: ["Loop them in", "Throw them under the bus", "Go behind their back"], ans: 1 },
        { q: "To do something secretly without telling your manager is to...", opts: ["Throw them under the bus", "Go behind their back", "Leak information"], ans: 1 },
        { q: "To include someone in an email thread or meeting is to...", opts: ["Loop them in", "Backshift them", "Deny them"], ans: 0 },
        // Category 1: Verb + To
        { q: "'I won't approve this!' -> He _____ to approve this.", opts: ["denied", "refused", "claimed"], ans: 1 },
        { q: "'I can help you with the code.' -> She _____ to help me.", opts: ["offered", "warned", "urged"], ans: 0 },
        { q: "Read: 'He refused signing the contract.' What's the error?", opts: ["It should be 'refused to sign'", "It should be 'refuse sign'", "No error"], ans: 0 },
        // Category 2: Verb + Object + To
        { q: "'Don't sign the contract, John!' -> I warned John _____ the contract.", opts: ["not signing", "to not sign", "not to sign"], ans: 2 },
        { q: "'You REALLY must apply for the job.' -> He _____ me to apply.", opts: ["urged", "said", "claimed"], ans: 0 },
        { q: "Read: 'The lawyer advised to delay.' What's the error?", opts: ["It is missing an object (advised US to delay).", "It should be 'advised delaying'.", "No error"], ans: 0 },
        // Category 3: Verb + (that)
        { q: "'I didn't leak the email!' -> He _____ that he leaked the email.", opts: ["refused", "denied", "blamed"], ans: 1 },
        { q: "'The system was hacked.' -> She _____ that the system was hacked.", opts: ["warned", "claimed", "accused"], ans: 1 },
        { q: "Read: 'She denied to leak the email.' What's the error?", opts: ["It should be 'denied leaking' or 'denied that she leaked'", "It should be 'denied to leaking'", "No error"], ans: 0 },
        // Category 4: Preposition + ING (Blame / Accuse)
        { q: "'You stole the presentation!' -> He accused her _____ stealing it.", opts: ["for", "of", "to"], ans: 1 },
        { q: "'It is IT's fault!' -> Marketing blamed IT _____ the crash.", opts: ["for", "of", "to"], ans: 0 },
        // Real-World Application
        { q: "A vendor says: 'It is John's fault!' Executive summary:", opts: ["The vendor accused John.", "The vendor blamed John.", "Both are acceptable in a report."], ans: 2 }
    ];

    let currentQ = 0; let score = 0; let locked = false;

    function startQuiz() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-ui').classList.remove('hidden'); document.getElementById('quiz-ui').classList.add('flex');
        loadQuestion();
    }

    function loadQuestion() {
        locked = false; const qData = quizData[currentQ]; const pct = ((currentQ) / quizData.length) * 100;
        
        document.getElementById('progress-bar').style.width = `${pct}%`;
        document.getElementById('q-counter').innerText = `Q ${currentQ + 1}/${quizData.length}`;

        let optsHtml = qData.opts.map((opt, i) => `
            <button class="option-btn" onclick="checkAnswer(${i}, this)">
                <div class="option-letter">${String.fromCharCode(65 + i)}</div>
                <div class="flex-1">${opt}</div>
            </button>
        `).join('');

        const html = `
            <div class="slide-in w-full">
                <p class="text-[10px] font-code text-[var(--accent-brand)] uppercase tracking-[0.3em] mb-4 bg-[var(--accent-brand)]/10 inline-block px-3 py-1 rounded border border-[var(--accent-brand)]/30">B2 Check</p>
                <h2 class="text-2xl font-medium text-white mb-8 leading-relaxed font-inter">${qData.q.replace(/_____/g, '<span class="text-[var(--accent-brand)] font-bold border-b border-[var(--accent-brand)]">_____</span>')}</h2>
                <div class="space-y-3 font-inter">${optsHtml}</div>
            </div>
        `;
        document.getElementById('question-area').innerHTML = html;
    }

    function checkAnswer(idx, btn) {
        if (locked) return; locked = true;
        const isCorrect = (idx === quizData[currentQ].ans); const allBtns = document.querySelectorAll('.option-btn');
        
        if (isCorrect) {
            btn.classList.add('correct'); score++; document.getElementById('score-display').innerText = `${score * 10} XP`;
        } else {
            btn.classList.add('wrong', 'shake'); allBtns[quizData[currentQ].ans].classList.add('correct');
            navigator.vibrate && navigator.vibrate(200);
        }

        setTimeout(() => { currentQ++; if (currentQ < quizData.length) loadQuestion(); else showWrap(); }, 1200);
    }

    function showWrap() {
        document.getElementById('quiz-ui').classList.remove('flex'); document.getElementById('quiz-ui').classList.add('hidden');
        document.getElementById('wrap-screen').classList.remove('hidden'); document.getElementById('wrap-screen').classList.add('flex');
        document.getElementById('progress-bar').style.width = `100%`; document.getElementById('final-score').innerText = `${score}/${quizData.length}`;
        if(score === quizData.length) document.getElementById('final-score').classList.replace('text-[var(--accent-brand)]', 'text-[var(--accent-success)]');
    }
</script>
</body>
</html>
